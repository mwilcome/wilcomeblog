# Basic site settings
# "https://mikewilcome.info/" or "http://localhost:1313"
baseURL = "https://mikewilcome.info"  # Update to "https://mikewilcome.info/" when deploying
languageCode = "en-us"
title = "Mike Wilcome’s Blog"

# Markup definitions
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# Module import for PaperMod
[module]
  [[module.imports]]
    path = "github.com/adityatelange/hugo-PaperMod"

# PaperMod-specific parameters
[params]
  author = "Mike Wilcome"
  description = "Principal Engineer with over a decade of experience in full-stack Java development, microservices, and leadership in tech and healthcare."
  ShowShareButtons = true
  ShowReadingTime = true
  ShowPostNavLinks = true

  # Social links
  [[params.social]]
    name = "GitHub"
    url = "https://github.com/mwilcome"
  [[params.social]]
    name = "LinkedIn"
    url = "https://linkedin.com/in/michael-wilcome-36377bb0"

# Menu configuration
[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Blog"
    url = "/blog/"
    weight = 2
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 3